<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Gail Pills">
<title>Gail's Pills</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root{--cream:#fdf6ee;--mid:#5c3d2e;--light:#8a6550;--pale:#a08070;--terra:#c4703a;--terra2:#d4845a;--bdr:#e8d0b8;--bdr2:#f0e0d0;--gbg:#f0faf4;--gbdr:#a8d5b5;--gtxt:#2d6a4f;--obg:#fff8f0;--obdr:#f4a261;--rbg:#fff5f5;--rbdr:#e63946;--bbg:#e8eaf6;--btxt:#3949ab;--nav:60px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--cream);color:#3d2c1e;overscroll-behavior:none}
header{background:linear-gradient(135deg,#e8d5c4,#f5e6d3,#fdf0e8);padding:50px 20px 14px;border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:20}
.hr{display:flex;justify-content:space-between;align-items:flex-start}
.title{font-family:'Fraunces',serif;font-size:28px;font-weight:300;color:var(--mid);line-height:1.1}
.title em{font-style:italic;color:var(--terra)}
.dpill{background:var(--terra);color:#fff;font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;margin-top:5px;display:inline-block}
.hbtns{display:flex;gap:8px}
.ibtn{width:40px;height:40px;border-radius:12px;border:1.5px solid var(--bdr);background:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.done{margin-top:10px;background:var(--gbg);border:1px solid var(--gbdr);color:var(--gtxt);border-radius:12px;padding:10px 14px;font-size:14px;font-weight:600;display:none;align-items:center;gap:8px}
main{padding-bottom:calc(var(--nav) + env(safe-area-inset-bottom,0px) + 10px)}
.page{display:none;padding:20px 16px}
.page.active{display:block}
#pgc{display:none;flex-direction:column;height:calc(100dvh - 128px - var(--nav) - env(safe-area-inset-bottom,0px))}
#pgc.active{display:flex}
.msgs{flex:1;overflow-y:auto;padding:14px 16px 6px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.bbl{max-width:84%;padding:11px 15px;border-radius:18px;font-size:15px;line-height:1.55}
.bbl.ai{background:#fff;border:1.5px solid var(--bdr2);align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 2px 8px rgba(196,112,58,.07)}
.bbl.me{background:linear-gradient(135deg,var(--terra),var(--terra2));color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.bbl.dots-wrap{background:#fff;border:1.5px solid var(--bdr2);align-self:flex-start;padding:13px 16px}
.dots{display:flex;gap:4px;align-items:center}
.dots span{width:8px;height:8px;background:var(--pale);border-radius:50%;animation:bop 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
.qa{flex-shrink:0;display:flex;gap:8px;padding:8px 16px;overflow-x:auto;border-top:1px solid var(--bdr2);background:var(--cream);scrollbar-width:none}
.qa::-webkit-scrollbar{display:none}
.qab{padding:8px 14px;background:#fff;border:1.5px solid var(--bdr);border-radius:20px;font-family:inherit;font-size:13px;font-weight:600;color:#5c3d2e;cursor:pointer;white-space:nowrap;flex-shrink:0}
.qab.hi{background:var(--terra);border-color:var(--terra);color:#fff}
.inrow{flex-shrink:0;display:flex;gap:8px;padding:8px 16px 12px;border-top:1px solid var(--bdr2);background:var(--cream)}
.cin{flex:1;padding:12px 16px;border:1.5px solid var(--bdr);border-radius:24px;font-family:inherit;font-size:15px;color:#3d2c1e;outline:none;background:#fff}
.cin:focus{border-color:var(--terra)}
.sbtn{width:46px;height:46px;background:linear-gradient(135deg,var(--terra),var(--terra2));border:none;border-radius:50%;cursor:pointer;font-size:20px;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sbtn:disabled{opacity:.4}
.pc{background:#fff;border-radius:18px;padding:18px;margin-bottom:12px;border:1.5px solid var(--bdr2);box-shadow:0 2px 10px rgba(196,112,58,.07)}
.pc.taken{background:var(--gbg);border-color:var(--gbdr)}
.pc.warn{border-color:var(--obdr);background:var(--obg)}
.pc.crit{border-color:var(--rbdr);background:var(--rbg)}
.pwho{font-size:11px;font-weight:700;color:var(--terra);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.pname{font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin-bottom:3px}
.psub{font-size:13px;color:var(--light);margin-bottom:10px;line-height:1.5}
.bdgs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.bdg{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600}
.bdg.sup{background:#e8f4ea;color:#2d6a4f}
.bdg.sup.warn{background:#fff0e0;color:#b85c00}
.bdg.sup.crit{background:#ffebeb;color:#c0392b}
.bdg.rep{background:var(--bbg);color:var(--btxt)}
.tbtn{width:100%;padding:15px;border:none;border-radius:13px;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.tbtn.go{background:linear-gradient(135deg,var(--terra),var(--terra2));color:#fff;box-shadow:0 4px 14px rgba(196,112,58,.3)}
.tbtn.go:active{transform:scale(.97)}
.tbtn.dn{background:var(--gbg);color:var(--gtxt);border:1.5px solid var(--gbdr);cursor:default}
.ttm{font-size:12px;opacity:.75;font-weight:400}
.ulnk{margin-top:6px;background:none;border:none;font-size:12px;color:var(--pale);cursor:pointer;text-decoration:underline;display:block}
.pfl{display:flex;gap:8px;padding:0 0 14px;overflow-x:auto;scrollbar-width:none}
.pfl::-webkit-scrollbar{display:none}
.pfc{padding:6px 14px;border-radius:20px;border:1.5px solid var(--bdr);background:#fff;font-family:inherit;font-size:13px;font-weight:600;color:var(--light);cursor:pointer;white-space:nowrap}
.pfc.on{background:var(--terra);border-color:var(--terra);color:#fff}
.emp{text-align:center;padding:50px 20px;color:var(--pale)}
.emp .ico{font-size:46px;margin-bottom:12px}
.stitle{font-family:'Fraunces',serif;font-size:18px;font-weight:300;font-style:italic;color:var(--mid);margin-bottom:14px}
.addbtn{width:100%;padding:14px;border:2px dashed #d4a882;background:transparent;border-radius:14px;font-family:inherit;font-size:15px;color:var(--terra);font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px}
.bkrow{display:flex;gap:10px;margin-bottom:18px}
.bkb{flex:1;padding:12px 8px;border-radius:11px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.bkb.sv{background:#fff5ee;border:1.5px solid var(--terra);color:var(--terra)}
.bkb.ld{background:#f0f4ff;border:1.5px solid var(--btxt);color:var(--btxt)}
.mc{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;border:1.5px solid var(--bdr2);box-shadow:0 2px 6px rgba(0,0,0,.04)}
.mchdr{display:flex;justify-content:space-between;align-items:flex-start}
.mcname{font-family:'Fraunces',serif;font-size:16px;font-weight:600}
.mcwho{font-size:11px;font-weight:700;color:var(--terra);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.mcdet{font-size:13px;color:var(--light);margin-top:2px}
.mcext{font-size:12px;color:var(--light);margin-top:3px;line-height:1.5}
.mcbtns{display:flex;gap:5px;flex-shrink:0}
.mcb{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--bdr2);background:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.bw{margin-top:9px}
.bg{background:#f0e4d4;border-radius:5px;height:7px;overflow:hidden}
.bf{height:100%;border-radius:5px}
.bl{display:flex;justify-content:space-between;font-size:11px;color:var(--pale);margin-top:3px}
.ac{background:#fff;border-radius:13px;padding:13px 15px;margin-bottom:10px;border-left:4px solid var(--terra);box-shadow:0 2px 6px rgba(0,0,0,.04)}
.ac.urg{border-left-color:var(--rbdr)}
.at{font-weight:600;font-size:15px;margin-bottom:3px}
.ad{font-size:13px;color:var(--light);line-height:1.5}
nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:#fff;border-top:1px solid var(--bdr2);display:flex;align-items:stretch;z-index:20;box-shadow:0 -2px 14px rgba(61,44,30,.08)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;font-family:inherit;font-size:10px;font-weight:600;color:var(--pale);cursor:pointer;position:relative;padding:8px 4px}
.ni{font-size:21px;line-height:1}
.nb.on{color:var(--terra)}
.nb.on::after{content:'';position:absolute;top:0;left:22%;right:22%;height:3px;background:var(--terra);border-radius:0 0 3px 3px}
.nbdg{position:absolute;top:5px;right:calc(50% - 20px);background:var(--rbdr);color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:9px;display:none;align-items:center;justify-content:center;padding:0 3px}
.ovl{position:fixed;inset:0;background:rgba(61,44,30,.55);z-index:100;display:flex;align-items:flex-end}
.mdl{background:var(--cream);border-radius:26px 26px 0 0;padding:26px 18px calc(30px + env(safe-area-inset-bottom,0px));width:100%;max-width:430px;margin:0 auto;max-height:90dvh;overflow-y:auto;animation:sup .3s ease}
.mtitle{font-family:'Fraunces',serif;font-size:21px;font-weight:300;font-style:italic;color:var(--mid);margin-bottom:16px}
.mtabs{display:flex;gap:8px;margin-bottom:16px}
.mta{flex:1;padding:10px;border:1.5px solid var(--bdr);background:#fff;border-radius:11px;font-family:inherit;font-size:13px;font-weight:600;color:var(--light);cursor:pointer;text-align:center}
.mta.on{border-color:var(--terra);background:#fff5ee;color:var(--terra)}
.pzone{border:2px dashed #d4a882;border-radius:14px;padding:28px 18px;text-align:center;cursor:pointer;background:#fff;margin-bottom:12px}
.pzi{font-size:38px;margin-bottom:9px}
.pzone p{color:var(--pale);font-size:14px;line-height:1.6}
.pprev{width:100%;border-radius:11px;margin-bottom:11px;max-height:170px;object-fit:cover}
.scbtn{width:100%;padding:14px;background:linear-gradient(135deg,var(--terra),var(--terra2));color:#fff;border:none;border-radius:13px;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:9px;display:flex;align-items:center;justify-content:center;gap:7px}
.scbtn:disabled{opacity:.55}
.scmsg{text-align:center;color:var(--light);font-size:14px;padding:9px;animation:pls 1.5s infinite}
.scerr{color:#c0392b;font-size:13px;background:#ffebeb;border-radius:9px;padding:9px;margin-top:7px}
.mpb{background:#fff8e8;border:1.5px solid #f4c261;border-radius:12px;padding:13px 14px;margin-bottom:12px}
.mpb h4{font-size:14px;font-weight:600;color:#7a5500;margin-bottom:5px}
.mpb p{font-size:13px;color:#8a6520;margin-bottom:9px;line-height:1.5}
.mpbtns{display:flex;flex-direction:column;gap:7px}
.mpb2{padding:10px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;text-align:center}
.mpb2.sc{background:var(--terra);color:#fff}
.mpb2.mn{background:#fff;border:1.5px solid var(--terra);color:var(--terra)}
.mpb2.un{background:#e8f4ea;color:var(--gtxt)}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:11px;font-weight:700;color:var(--mid);margin-bottom:5px;letter-spacing:.4px;text-transform:uppercase}
.fld input,.fld select{width:100%;padding:11px 13px;border:1.5px solid var(--bdr);border-radius:11px;background:#fff;font-family:inherit;font-size:15px;color:#3d2c1e;outline:none;-webkit-appearance:none}
.fld input:focus,.fld select:focus{border-color:var(--terra)}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.tgd{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.tch{padding:9px 5px;border:1.5px solid var(--bdr);background:#fff;border-radius:9px;font-family:inherit;font-size:13px;font-weight:500;color:var(--light);cursor:pointer;text-align:center}
.tch.on{border-color:var(--terra);background:#fff5ee;color:var(--terra);font-weight:600}
.stp{display:flex;align-items:center;border:1.5px solid var(--bdr);border-radius:11px;overflow:hidden;background:#fff}
.stpb{width:48px;height:46px;border:none;background:#f7ede0;font-size:20px;color:var(--terra);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stpb:active{background:#ffe0cc}
.stpv{flex:1;text-align:center;font-size:17px;font-weight:600;border:none;outline:none;background:transparent;font-family:inherit;color:#3d2c1e}
.qhint{font-size:12px;color:var(--pale);margin-top:4px}
.cntb{width:100%;padding:10px;border:1.5px dashed var(--bdr);border-radius:11px;background:transparent;font-family:inherit;font-size:13px;font-weight:600;color:var(--light);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:7px}
.cntm{text-align:center;font-size:13px;color:var(--light);padding:7px;animation:pls 1.5s infinite}
.ntr{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1.5px solid var(--bdr);border-radius:11px;padding:11px 13px;margin-bottom:12px}
.ntr span{font-size:14px;color:var(--mid);font-weight:500}
.tog{width:44px;height:25px;background:#ddd;border-radius:13px;border:none;cursor:pointer;position:relative;flex-shrink:0}
.tog.on{background:var(--terra)}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:19px;height:19px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog.on::after{transform:translateX(19px)}
.svbtn{width:100%;padding:16px;background:linear-gradient(135deg,var(--terra),var(--terra2));color:#fff;border:none;border-radius:15px;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}
.clnk{width:100%;padding:12px;background:transparent;border:none;font-family:inherit;font-size:15px;color:var(--pale);cursor:pointer;margin-top:3px;display:block;text-align:center}
.toast{position:fixed;bottom:calc(var(--nav) + env(safe-area-inset-bottom,0px) + 10px);left:50%;transform:translateX(-50%);background:#3d2c1e;color:#fff;padding:10px 20px;border-radius:26px;font-size:14px;font-weight:500;z-index:200;white-space:nowrap;box-shadow:0 4px 18px rgba(0,0,0,.25);animation:tin .3s ease}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
 
<header>
  <div class="hr">
    <div>
      <div class="title">Gail's <em>pills</em></div>
      <div class="dpill" id="dp"></div>
    </div>
    <div class="hbtns">
      <button class="ibtn" id="nBtn" onclick="askNotif()" title="Notifications">&#x1F514;</button>
      <button class="ibtn" onclick="chgName()" title="Change name">&#x1F464;</button>
    </div>
  </div>
  <div class="done" id="done">&#x2705; All done for today!</div>
</header>
 
<main>
 
  <div id="pgc" class="active">
    <div class="msgs" id="msgs"></div>
    <div class="qa">
      <button class="qab hi" onclick="qa('today')">&#x1F48A; Today</button>
      <button class="qab" onclick="qa('meds')">&#x1F4CB; Medicines</button>
      <button class="qab" onclick="qa('supply')">&#x26A0;&#xFE0F; Supplies</button>
      <button class="qab" onclick="qa('add')">&#x2795; Add medicine</button>
      <button class="qab" onclick="qa('interact')">&#x1F52C; Interactions</button>
      <button class="qab" onclick="qa('tips')">&#x1F4A1; Tips</button>
    </div>
    <div class="inrow">
      <input class="cin" id="cin" placeholder="Type a message&#x2026;" onkeydown="if(event.key==='Enter')send()">
      <button class="sbtn" id="sbtn" onclick="send()">&#x27A4;</button>
    </div>
  </div>
 
  <div id="pgt" class="page">
    <div class="pfl" id="pfl"></div>
    <div id="tlist"></div>
  </div>
 
  <div id="pgm" class="page">
    <div class="stitle">Your medicines</div>
    <button class="addbtn" onclick="openAdd()">+ Add a medicine</button>
    <div class="bkrow">
      <button class="bkb sv" onclick="expData()">&#x1F4BE; Save backup</button>
      <button class="bkb ld" onclick="document.getElementById('impF').click()">&#x1F4C2; Restore</button>
    </div>
    <div id="mlist"></div>
  </div>
 
  <div id="pga" class="page">
    <div class="stitle">What needs attention</div>
    <div id="alist"></div>
  </div>
 
</main>
 
<nav>
  <button class="nb on" id="nb-c" onclick="go('c')"><span class="ni">&#x1F4AC;</span>Chat</button>
  <button class="nb"    id="nb-t" onclick="go('t')"><span class="ni">&#x1F4C5;</span>Today</button>
  <button class="nb"    id="nb-m" onclick="go('m')"><span class="ni">&#x1F48A;</span>Medicines</button>
  <button class="nb"    id="nb-a" onclick="go('a')"><span class="ni">&#x26A0;&#xFE0F;</span>Alerts<span class="nbdg" id="abadge">0</span></button>
</nav>
 
<div class="ovl" id="addM" style="display:none" onclick="if(event.target===this)clsAdd()">
  <div class="mdl">
    <div class="mtitle">Add a medicine</div>
    <div class="mtabs">
      <button class="mta on" id="mta-p" onclick="mTab('p')">&#x1F4F7; Photo scan</button>
      <button class="mta" id="mta-m" onclick="mTab('m')">&#x270F;&#xFE0F; Type it in</button>
    </div>
    <div id="mpP">
      <input type="file" id="pF" accept="image/*" capture="environment" style="display:none" onchange="onPh(this)">
      <div id="pZone" class="pzone" onclick="document.getElementById('pF').click()">
        <div class="pzi">&#x1F4F7;</div>
        <p>Take a photo of the pharmacy sticker<br><br><strong>Tap to open camera</strong></p>
      </div>
      <img id="pPrev" class="pprev" style="display:none">
      <button class="scbtn" id="scBtn" style="display:none" onclick="doScan()">&#x1F50D; Read the label</button>
      <button class="clnk" id="rtBtn" style="display:none" onclick="retake()">Use a different photo</button>
      <div class="scmsg" id="scMsg" style="display:none">Reading label&#x2026;</div>
      <div class="scerr" id="scErr" style="display:none"></div>
    </div>
    <div id="mpM" style="display:none">
      <div class="mpb" id="mpBan" style="display:none">
        <h4 id="mpT">&#x1F4E6; Multiple packets</h4>
        <p id="mpMsg"></p>
        <div class="mpbtns">
          <button class="mpb2 sc" onclick="scPkt2()">&#x1F4F7; Scan other packet</button>
          <button class="mpb2 mn" onclick="entPkt2()">&#x270F;&#xFE0F; Enter qty manually</button>
          <button class="mpb2 un" onclick="flPkt2()">&#x1F4E6; Other packet unopened</button>
        </div>
      </div>
      <div class="fld"><label>For</label><input id="fPer" placeholder="e.g. Gail"></div>
      <div class="fld"><label>Medicine name *</label><input id="fNm" placeholder="e.g. Metformin"></div>
      <div class="r2">
        <div class="fld"><label>Strength</label><input id="fStr" placeholder="e.g. 500mg"></div>
        <div class="fld"><label>Tablets/dose</label><input id="fPPD" type="number" min="0.5" step="0.5" value="1"></div>
      </div>
      <div class="fld"><label>How often</label>
        <select id="fFrq"><option>Once daily</option><option>Twice daily</option><option>Three times daily</option><option>Every other day</option><option>Weekly</option></select>
      </div>
      <div class="fld"><label>Reminder times</label><div class="tgd" id="tChp"></div></div>
      <div class="fld">
        <label>Tablets remaining</label>
        <div class="stp"><button class="stpb" onclick="adj('fQt',-1)">&#x2212;</button><input class="stpv" id="fQt" type="number" placeholder="?"><button class="stpb" onclick="adj('fQt',1)">+</button></div>
        <div class="qhint">Adjust if partly used</div>
        <input type="file" id="cntF" accept="image/*" capture="environment" style="display:none" onchange="cntPills(this)">

<script>
const WU="https://gails-pills-proxy.casparlewis.workers.dev";
const KM="gp-meds-v5",KC="gp-chks-v5",KU="gp-usr-v1";
const TMS=["Morning","Midday","Afternoon","Night"];
const THR={Morning:8,Midday:12,Afternoon:15,Night:21};
 
let meds=JSON.parse(localStorage.getItem(KM)||"[]");
let chks=JSON.parse(localStorage.getItem(KC)||"{}");
let usr=localStorage.getItem(KU)||"";
let pg="c",who="All",selT=["Morning"];
let ph64=null,phMime=null,edId=null,pN=null,pT=null,pQ=null;
let cH=[],rdy=false,bsy=false,nTm=[],tTm=null;
 
// utils
const td=()=>new Date().toISOString().slice(0,10);
const fd=d=>d.toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"});
const ft=i=>new Date(i).toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit"});
const sc=d=>d>14?"#52b788":d>7?"#f4a261":"#e63946";
const dpd=f=>{const s=(f||"").toLowerCase();return s.includes("twice")||s.includes("2")?2:s.includes("three")||s.includes("3")?3:1;};
const dy=m=>{const q=parseFloat(m.qty),p=parseFloat(m.ppd||1),d=dpd(m.freq);return(q&&p&&d)?Math.floor(q/(p*d)):null;};
const done=()=>meds.length&&meds.every(m=>(chks[td()]||{})[m.id]);
const fil=()=>who==="All"?meds:meds.filter(m=>(m.who||"")===who);
const ge=id=>document.getElementById(id);
const qs=s=>document.querySelectorAll(s);
 
function save(){localStorage.setItem(KM,JSON.stringify(meds));localStorage.setItem(KC,JSON.stringify(chks));expData();}
function expData(){
  const d={v:5,at:new Date().toISOString(),meds,chks,usr};
  const b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});
  const u=URL.createObjectURL(b);const a=document.createElement("a");
  a.href=u;a.download="gails-pills-backup.json";a.click();URL.revokeObjectURL(u);
}
function impData(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.meds){meds=d.meds;localStorage.setItem(KM,JSON.stringify(meds));}if(d.chks){chks=d.chks;localStorage.setItem(KC,JSON.stringify(chks));}if(d.usr){usr=d.usr;localStorage.setItem(KU,usr);}rAll();sched();toast("Restored!");}catch(e){toast("Couldn't read file");}};
  r.readAsText(f);inp.value="";
}
 
function go(name){
  pg=name;
  qs(".page,#pgc").forEach(p=>p.classList.remove("active"));
  ge("pg"+name).classList.add("active");
  qs(".nb").forEach(b=>b.classList.remove("on"));
  ge("nb-"+name).classList.add("on");
  if(name==="c")renderChat();
  else if(name==="t")renderT();
  else if(name==="m")renderM();
  else if(name==="a")renderA();
}
 
function rAll(){
  ge("done").style.display=done()?"flex":"none";
  const n=alts().length,bdg=ge("abadge");
  bdg.textContent=n;bdg.style.display=n?"flex":"none";
  if(pg==="t")renderT();
  if(pg==="m")renderM();
  if(pg==="a")renderA();
}
 
function renderT(){
  const prs=[...new Set(meds.map(m=>m.who||"").filter(Boolean))];
  ge("pfl").innerHTML=prs.length>=2?["All",...prs].map(p=>`<button class="pfc${who===p?" on":""}" onclick="setW('${p}')">${p}</button>`).join(""):"";
  const tc=chks[td()]||{},fm=fil(),l=ge("tlist");
  if(!meds.length){l.innerHTML=`<div class="emp"><div class="ico">&#x1F48A;</div><p>No medicines yet.<br>Tap <strong>Medicines</strong> below.</p></div>`;return;}
  if(!fm.length){l.innerHTML=`<div class="emp"><div class="ico">&#x1F48A;</div><p>No medicines for ${who}.</p></div>`;return;}
  l.innerHTML=fm.map((m,i)=>{
    const tk=!!tc[m.id],d=dy(m),w=d!==null&&d<=7,cr=d!==null&&d<=3;
    const cc=tk?"taken":cr?"crit":w?"warn":"",bc=cr?"crit":w?"warn":"";
    const sb=d!==null?`<span class="bdg sup ${bc}">${cr?"&#x26A0;&#xFE0F; ":w?"&#x26A1; ":"&#x1F48A; "}${d} days left</span>`:"";
    const rb=m.rpts?`<span class="bdg rep">&#x1F501; ${m.rpts} repeat${m.rpts!=="1"?"s":""}</span>`:"";
    const sub=[m.str,m.ppd?m.ppd+" tablet"+(m.ppd!=="1"?"s":""):"",m.freq,(m.tms||[]).join(" & ")].filter(Boolean).join(" · ");
    const btn=tk?`<button class="tbtn dn">&#x2713; Taken <span class="ttm">at ${ft(tc[m.id])}</span></button><button class="ulnk" onclick="undo('${m.id}')">undo</button>`:`<button class="tbtn go" onclick="take('${m.id}')">Tap when taken</button>`;
    return `<div class="pc ${cc}" style="animation:fu .3s ${i*.07}s both">${m.who?`<div class="pwho">${m.who}</div>`:""}<div class="pname">${m.name}</div><div class="psub">${sub}</div><div class="bdgs">${sb}${rb}</div>${btn}</div>`;
  }).join("");
}
function setW(w){who=w;renderT();}
function take(id){
  const t=td();if(!chks[t])chks[t]={};
  chks[t][id]=new Date().toISOString();
  meds=meds.map(m=>m.id!==id?m:{...m,qty:String(Math.max(0,(parseFloat(m.qty)||0)-parseFloat(m.ppd||1)))});
  save();rAll();
}
function undo(id){const t=td();if(chks[t])delete chks[t][id];save();rAll();}
 
function renderM(){
  const l=ge("mlist");
  if(!meds.length){l.innerHTML=`<div class="emp" style="padding:16px 0"><p>No medicines yet.</p></div>`;return;}
  l.innerHTML=meds.map(m=>{
    const d=dy(m);
    const bar=d!==null?`<div class="bw"><div class="bg"><div class="bf" style="width:${Math.min(100,(d/30)*100)}%;background:${sc(d)}"></div></div><div class="bl"><span>${d} days left</span><span>${m.rpts?m.rpts+" repeat"+(m.rpts!=="1"?"s":""):"no repeats"}</span></div></div>`:"";
    const ext=[m.dr?"&#x1F468;&#x200D;&#x2695;&#xFE0F; "+m.dr:"",m.ph?"&#x1F3E5; "+m.ph+(m.phn?` · <a href="tel:${m.phn}" style="color:var(--terra);text-decoration:none;font-weight:600">${m.phn}</a>`:""):"",m.adr?"&#x1F4CD; "+m.adr:"",m.dt?"&#x1F4C5; Dispensed "+m.dt:"",m.notif?"&#x1F514; "+(m.tms||[]).join(", "):""].filter(Boolean).map(e=>`<div class="mcext">${e}</div>`).join("");
    return `<div class="mc"><div class="mchdr"><div style="flex:1;min-width:0">${m.who?`<div class="mcwho">${m.who}</div>`:""}<div class="mcname">${m.name}</div><div class="mcdet">${[m.str,m.freq].filter(Boolean).join(" · ")}</div>${ext}</div><div class="mcbtns"><button class="mcb" onclick="opnEdt('${m.id}')">&#x270F;&#xFE0F;</button><button class="mcb" onclick="dlById('${m.id}')">&#x1F5D1;</button></div></div>${bar}</div>`;
  }).join("");
}
function dlById(id){if(!confirm("Remove this medicine?"))return;meds=meds.filter(m=>m.id!==id);save();sched();rAll();}
 
function alts(){
  const out=[];
  meds.forEach(m=>{
    const d=dy(m),r=parseInt(m.rpts||"0");if(d===null)return;
    const w=m.who?" for "+m.who:"",ph=m.phn?" Pharmacy: "+m.phn:"",dr=m.dr?"Call "+m.dr+" for a script.":"See your doctor.";
    if(d<=3&&r===0)out.push({type:"urg",name:m.name,who:m.who,msg:`Only ${d} day${d!==1?"s":""} left${w} with no repeats. ${dr}${ph}`});
    else if(d<=7)out.push({type:"warn",name:m.name,who:m.who,msg:`About ${d} days left${w}. ${r>0?r+" repeat"+(r>1?"s":"")+" remaining — time for a new script.":"No repeats — "+dr}${ph}`});
  });
  return out;
}
function renderA(){
  const al=alts(),l=ge("alist");
  l.innerHTML=al.length?al.map(a=>`<div class="ac ${a.type}"><div class="at">${a.name}${a.who?` <span style="font-size:12px;opacity:.7">· ${a.who}</span>`:""}</div><div class="ad">${a.msg}</div></div>`).join(""):`<div class="emp"><div class="ico">&#x1F33F;</div><p>All supplies good.</p></div>`;
}
 
function buildSys(){
  var tc=chks[td()]||{},hr=new Date().getHours(),tod=hr<12?"morning":hr<17?"afternoon":"evening";
  var ml=meds.map(function(m){var tk=tc[m.id]?"TAKEN at "+ft(tc[m.id]):"NOT YET TAKEN";var d=dy(m);return "- "+m.name+(m.str?" "+m.str:"")+" ("+m.freq+")"+(m.who?" for "+m.who:"")+": "+tk+". "+(d!==null?d+" days left":"unknown")+", "+(m.rpts||"no")+" repeats."+(m.dr?" Dr:"+m.dr:"")+(m.phn?" Ph:"+m.phn:"");});
  return "You are a warm caring medication helper called Gail's Pills. Like a trusted knowledgeable friend. Today: "+fd(new Date())+" ("+tod+"). User: "+(usr||"unknown")+". MEDICINES: "+(ml.length?ml.join("; "):"None yet.")+". ROLE: Daily reminders, health companion, reorder support. HEALTH GUIDANCE: Share interactions (grapefruit+Felodipine etc), foods/things to avoid, never-stop-suddenly medicines, side effects worth watching. Frame research as ask your doctor about. RULES: Informational only, defer to doctor/pharmacist, short responses (2-4 sentences), suggest Today tab to mark taken. Tone: warm caring knowledgeable friend.";
}
function openMsg(){
  var tc=chks[td()]||{},un=meds.filter(function(m){return !tc[m.id];}),tk=meds.filter(function(m){return tc[m.id];}),n=usr||null;
  var gr=(n?"Hi "+n+"! ":"Hi there! ")+"\uD83D\uDC4B";
  var hr=new Date().getHours(),tg=hr<12?"Good morning!":hr<17?"Good afternoon!":"Good evening!";
  if(!meds.length) return gr+" "+tg+" I\'m your medication helper. No medicines added yet \u2014 tap + Add medicine or the Medicines tab!";
  if(!un.length) return gr+" "+tg+" You\'ve taken all your medicines today \u2014 well done!";
  var msg=gr+" "+tg;
  if(un.length===meds.length){
    msg+=" Here\'s your list today: "+un.map(function(m){return m.name+(m.str?" "+m.str:"")+(m.who&&m.who!==n?" (for "+m.who+")":"");}).join(", ")+". Have you taken any of these yet?";
  } else {
    msg+=" You\'ve taken "+tk.length+" of "+meds.length+" today. Still to go: "+un.map(function(m){return m.name+(m.who&&m.who!==n?" (for "+m.who+")":"");}).join(", ")+". Taken them?";
  }
  var urg=alts().filter(function(a){return a.type==="urg";});
  if(urg.length) msg+=" Also \u2014 "+urg[0].name+" is running very low. Worth sorting soon.";
  return msg;
}
function renderChat(){
  const m=ge("msgs");if(!m)return;
  m.innerHTML="";
  if(!rdy){rdy=true;cH=[];const op=openMsg();addBbl("ai",op);cH.push({role:"assistant",content:op});}
  else cH.forEach(h=>addBbl(h.role==="assistant"?"ai":"me",h.content));
  scrll();
}
function addBbl(role,txt){
  var m=ge("msgs");if(!m)return;
  var d=document.createElement("div");d.className="bbl "+role;
  var html=txt.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br>");
  d.innerHTML=html;m.appendChild(d);scrll();
}
function showDots(){const m=ge("msgs");if(!m)return;const d=document.createElement("div");d.className="bbl dots-wrap";d.id="dots";d.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';m.appendChild(d);scrll();}
function hideDots(){const d=ge("dots");if(d)d.remove();}
function scrll(){setTimeout(()=>{const m=ge("msgs");if(m)m.scrollTop=m.scrollHeight;},40);}
function send(){const i=ge("cin");if(!i)return;const t=i.value.trim();if(!t||bsy)return;i.value="";chat(t);}
function qa(type){
  const m={today:"What do I still need to take today?",meds:"Give me a summary of all my medicines.",supply:"Which medicines are running low?",add:"I'd like to add a new medicine.",interact:"Any interactions I should know about?",tips:"What tips, side effects or things should I know about my medicines?"};
  if(type==="add"){chat(m.add);setTimeout(openAdd,600);return;}
  chat(m[type]);
}
async function chat(txt){
  if(bsy)return;bsy=true;
  const sb=ge("sbtn");if(sb)sb.disabled=true;
  addBbl("me",txt);cH.push({role:"user",content:txt});showDots();
  try{
    const r=await fetch(WU,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:400,system:buildSys(),messages:cH})});
    const d=await r.json();if(!r.ok)throw new Error("API "+r.status);
    const rep=(d.content||[]).find(b=>b.type==="text")?.text||"Sorry, I didn't catch that.";
    hideDots();addBbl("ai",rep);cH.push({role:"assistant",content:rep});
    chkTkn(txt);rAll();
  }catch(e){hideDots();addBbl("ai","Sorry, I'm having trouble connecting. Please check your internet.");}
  finally{bsy=false;if(sb)sb.disabled=false;}
}
function chkTkn(txt){
  const lo=txt.toLowerCase();
  if(!["taken","took","had","done","yes"].some(p=>lo.includes(p)))return;
  const t=td();if(!chks[t])chks[t]={};let upd=false;
  if(lo.includes("all")||lo.includes("everything")){meds.forEach(m=>{if(!chks[t][m.id]){chks[t][m.id]=new Date().toISOString();upd=true;}});}
  else{meds.forEach(m=>{if(!chks[t][m.id]&&lo.includes(m.name.toLowerCase())){chks[t][m.id]=new Date().toISOString();upd=true;}});}
  if(upd){localStorage.setItem(KC,JSON.stringify(chks));ge("done").style.display=done()?"flex":"none";}
}
 
function askNotif(){
  if(!("Notification" in window)){toast("Not supported");return;}
  if(Notification.permission==="denied"){toast("Blocked — check settings");return;}
  Notification.requestPermission().then(p=>{ge("nBtn").style.background=p==="granted"?"#f0faf4":"none";if(p==="granted"){toast("Reminders on!");sched();}});
}
function sched(){
  nTm.forEach(t=>clearTimeout(t));nTm=[];
  if(!("Notification" in window)||Notification.permission!=="granted")return;
  meds.forEach(m=>{if(!m.notif)return;(m.tms||["Morning"]).forEach(t=>schedOne(m,t));});
  const now=new Date(),mn=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,1);
  nTm.push(setTimeout(sched,mn-now));
}
function schedOne(med,tn){
  const h=THR[tn]||8,now=new Date(),fire=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,0,0);
  if(fire<=now)return;
  nTm.push(setTimeout(()=>{if(!(chks[td()]||{})[med.id])new Notification("Time for "+med.name,{body:(med.str?med.str+" · ":"")+(med.ppd||1)+" tablet(s)"+(med.who?" for "+med.who:""),tag:med.id+"-"+tn});},fire-now));
}
 
// ADD MODAL
function openAdd(){resetF();ge("addM").style.display="flex";}
function clsAdd(){ge("addM").style.display="none";resetF();}
function resetF(){
  ph64=null;phMime=null;pN=null;pT=null;pQ=null;selT=["Morning"];
  ["pF","cntF"].forEach(id=>{const e=ge(id);if(e)e.value="";});
  ge("pPrev").style.display="none";ge("pZone").style.display="";
  ge("scBtn").style.display="none";ge("rtBtn").style.display="none";
  ge("scMsg").style.display="none";ge("scErr").style.display="none";
  ge("mpBan").style.display="none";ge("pkt2F").style.display="none";ge("cntMsg").style.display="none";
  ["fPer","fNm","fStr","fDr","fPh","fPhn","fAdr","fDt","fPkt"].forEach(id=>ge(id).value="");
  ge("fPPD").value="1";ge("fFrq").value="Once daily";ge("fQt").value="";ge("fQt2").value="";ge("fRpt").value="";
  ge("fTog").classList.add("on");buildTC();mTab("p");
}
function mTab(t){
  ge("mta-p").classList.toggle("on",t==="p");ge("mta-m").classList.toggle("on",t==="m");
  ge("mpP").style.display=t==="p"?"":"none";ge("mpM").style.display=t==="m"?"":"none";
}
function buildTC(){ge("tChp").innerHTML=TMS.map(t=>`<button type="button" class="tch${selT.includes(t)?" on":""}" onclick="togT('${t}',this)">${t}</button>`).join("");}
function togT(n,b){if(selT.includes(n)){if(selT.length===1)return;selT=selT.filter(t=>t!==n);b.classList.remove("on");}else{selT.push(n);b.classList.add("on");}}
function adj(id,d){const e=ge(id);e.value=Math.max(0,(parseFloat(e.value)||0)+d);}
function onPh(inp){
  const f=inp.files[0];if(!f)return;phMime=f.type||"image/jpeg";
  const r=new FileReader();
  r.onload=e=>{ph64=e.target.result.split(",")[1];ge("pPrev").src=e.target.result;ge("pPrev").style.display="";ge("pZone").style.display="none";ge("scBtn").style.display="";ge("rtBtn").style.display="";ge("scErr").style.display="none";};
  r.readAsDataURL(f);
}
function retake(){ph64=null;phMime=null;ge("pF").value="";ge("pPrev").style.display="none";ge("pZone").style.display="";ge("scBtn").style.display="none";ge("rtBtn").style.display="none";}
async function doScan(){
  if(!ph64)return;ge("scBtn").disabled=true;ge("scMsg").style.display="";ge("scErr").style.display="none";
  try{
    const r=await fetch(WU,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:phMime,data:ph64}},{type:"text",text:`Read this Australian pharmacy label. ONLY return valid JSON:
{"name":"","str":"strength","freq":"frequency","ppd":"pills/dose","qty":"total qty","rpts":"repeats","dr":"doctor","ph":"pharmacy name","phn":"phone","adr":"address","dt":"DD/MM/YY","pktN":"packet number if shown","pktT":"total packets if shown"}
Empty string for unclear fields.`}]}]})});
    const data=await r.json();if(!r.ok)throw new Error("API "+r.status+": "+JSON.stringify(data.error||data));
    const txt=(data.content||[]).find(b=>b.type==="text")?.text||"";
    const p=JSON.parse(txt.replace(/```json|```/g,"").trim());
    ge("fNm").value=p.name||"";ge("fStr").value=p.str||"";ge("fPPD").value=p.ppd||"1";ge("fFrq").value=p.freq||"Once daily";
    ge("fQt").value=p.qty||"";ge("fRpt").value=p.rpts||"";ge("fDr").value=p.dr||"";ge("fPh").value=p.ph||"";
    ge("fPhn").value=p.phn||"";ge("fAdr").value=p.adr||"";ge("fDt").value=p.dt||"";
    if(p.pktN&&p.pktT&&p.pktT!=="1"){pN=parseInt(p.pktN);pT=parseInt(p.pktT);pQ=parseFloat(p.qty)||0;ge("fPkt").value=p.pktN+" of "+p.pktT;ge("mpT").textContent="Packet "+p.pktN+" of "+p.pktT;ge("mpMsg").textContent=pN<pT?"Packet "+p.pktN+" of "+p.pktT+". What about the other packet?":"Last packet. Has the previous one been started?";ge("mpBan").style.display="";}
    mTab("m");
  }catch(e){ge("scErr").textContent="Error: "+e.message;ge("scErr").style.display="";mTab("m");}
  finally{ge("scBtn").disabled=false;ge("scMsg").style.display="none";}
}
function scPkt2(){ge("mpBan").style.display="none";ge("p2F").click();}
async function onP2(inp){
  var f=inp.files[0];if(!f)return;var mime=f.type||"image/jpeg";toast("Reading second packet…");
  var r=new FileReader();
  r.onload=async function(e){
    var b=e.target.result.split(",")[1];
    try{
      var res=await fetch(WU,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:100,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mime,data:b}},{type:"text",text:"Read the total quantity dispensed from this pharmacy label. Return only JSON with a qty field as a string number."}]}]})});
      var d=await res.json();var t=(d.content||[]).find(function(b){return b.type==="text";});t=t?t.text:"";
      var p=JSON.parse(t.replace(/```json|```/g,"").trim());
      ge("fQt2").value=parseFloat(p.qty)||0;ge("pkt2F").style.display="";toast("Second packet added");
    }catch(e){toast("Couldn't read — enter manually");entPkt2();}
  };
  r.readAsDataURL(f);
}
function entPkt2(){ge("mpBan").style.display="none";ge("pkt2F").style.display="";}
function flPkt2(){ge("fQt2").value=pQ||"";ge("pkt2F").style.display="";ge("mpBan").style.display="none";toast("Full second packet added");}
async function cntPills(inp){
  var f=inp.files[0];if(!f)return;var mime=f.type||"image/jpeg";ge("cntMsg").style.display="";
  var r=new FileReader();
  r.onload=async function(e){
    var b=e.target.result.split(",")[1];
    try{
      var res=await fetch(WU,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:100,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mime,data:b}},{type:"text",text:"Count the tablets or capsules visible in this image. Return only JSON with a count field as a string number, or empty string if unclear."}]}]})});
      var d=await res.json();var t=(d.content||[]).find(function(b){return b.type==="text";});t=t?t.text:"";
      var p=JSON.parse(t.replace(/```json|```/g,"").trim());
      if(p.count){ge("fQt").value=p.count;toast("Counted "+p.count+" tablets");}else toast("Couldn't count — adjust manually");

  };
  r.readAsDataURL(f);
}
function addMed(){
  const name=ge("fNm").value.trim();if(!name){toast("Please enter a medicine name");return;}
  const q1=parseFloat(ge("fQt").value)||0,q2=parseFloat(ge("fQt2").value)||0;
  meds.push({id:Date.now().toString(),at:new Date().toISOString(),who:ge("fPer").value.trim(),name,str:ge("fStr").value.trim(),ppd:ge("fPPD").value||"1",freq:ge("fFrq").value,tms:[...selT],qty:String(q1+q2||""),rpts:ge("fRpt").value,dr:ge("fDr").value.trim(),ph:ge("fPh").value.trim(),phn:ge("fPhn").value.trim(),adr:ge("fAdr").value.trim(),dt:ge("fDt").value.trim(),pkt:ge("fPkt").value.trim(),notif:ge("fTog").classList.contains("on")});
  save();sched();clsAdd();toast("&#x1F48A; "+(ge("fPer").value.trim()?ge("fPer").value.trim()+": ":"")+name+" added!");rAll();
}

function svEdt(){

}
function dlMed(){
  if(!edId)return;const m=meds.find(m=>m.id===edId);if(!m)return;
  if(confirm("Remove "+m.name+"?")){meds=meds.filter(m=>m.id!==edId);save();sched();clsEdt();toast("Removed "+m.name);rAll();}

function chgName(){const n=prompt("What's your name?",usr||"");if(n!==null&&n.trim()){usr=n.trim();localStorage.setItem(KU,usr);rdy=false;toast("Hi "+usr+"!");if(pg==="c")renderChat();}}

document.addEventListener("DOMContentLoaded",()=>{
